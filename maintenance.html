<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Temporarily Unavailable</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 40px 25px;
      max-width: 600px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.7;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Website Temporarily Unavailable</h1>
    <p>This website is currently unavailable.</p>
    <p>Please check back later.</p>
  </div>
</body>
</html>
